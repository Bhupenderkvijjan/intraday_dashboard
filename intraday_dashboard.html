<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Intraday Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Rajdhani:wght@400;600;700&display=swap" rel="stylesheet"/>
<style>
/* ═══════════════════════════════════════════
   THEME TOKENS
═══════════════════════════════════════════ */
:root, [data-theme="dark"] {
  --bg:         #0b0e14;
  --surface:    #111520;
  --surface2:   #161b27;
  --border:     #1e2535;
  --accent:     #00d4aa;
  --warn:       #f7c948;
  --danger:     #ff5f57;
  --text:       #c9d1e0;
  --muted:      #4a5568;
  --hline-hi:   #4fa3ff;
  --hline-lo:   #ff8c42;
  --bull-fill:  #f5f07a;
  --bull-wick:  #aaaaaa;
  --bear-fill:  #111520;
  --bear-wick:  #cccccc;
  --bear-edge:  #cccccc;
  --bull-edge:  #aaaaaa;
  --chart-bg:   #0d1117;
  --chart-grid: rgba(255,255,255,0.04);
  --skel-a:     #1e2535;
  --skel-b:     #1e2a3a;
  --shadow:     0 2px 16px rgba(0,0,0,.45);
  --font-mono:  'Share Tech Mono', monospace;
  --font-ui:    'Rajdhani', sans-serif;
  --radius:     6px;
}
[data-theme="light"] {
  --bg:         #eff1f5;
  --surface:    #ffffff;
  --surface2:   #f6f8fb;
  --border:     #dce1ea;
  --accent:     #0a7c5c;
  --warn:       #b97800;
  --danger:     #cc2222;
  --text:       #1a2035;
  --muted:      #7a8499;
  --hline-hi:   #1565c0;
  --hline-lo:   #c65000;
  --bull-fill:  #2a7a2a;
  --bull-wick:  #2a7a2a;
  --bear-fill:  #ffffff;
  --bear-wick:  #cc2222;
  --bear-edge:  #cc2222;
  --bull-edge:  #2a7a2a;
  --chart-bg:   #f9fafb;
  --chart-grid: rgba(0,0,0,0.06);
  --skel-a:     #dde2ec;
  --skel-b:     #ccd3e0;
  --shadow:     0 2px 12px rgba(0,0,0,.09);
}

/* ═══════════════════════════════════════════
   RESET
═══════════════════════════════════════════ */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:var(--font-ui);min-height:100vh;transition:background .22s,color .22s}

/* ═══════════════════════════════════════════
   HEADER
═══════════════════════════════════════════ */
header{
  display:flex;align-items:center;justify-content:space-between;
  padding:11px 20px;gap:10px;flex-wrap:wrap;
  background:var(--surface);border-bottom:1px solid var(--border);
  position:sticky;top:0;z-index:100;box-shadow:var(--shadow);
  transition:background .22s;
}
header h1{font-family:var(--font-mono);font-size:1rem;color:var(--accent);letter-spacing:.12em;text-transform:uppercase;white-space:nowrap}
header h1 span{color:var(--warn)}
#clock{font-family:var(--font-mono);font-size:.78rem;color:var(--muted);white-space:nowrap}
.hctrl{display:flex;gap:7px;align-items:center;flex-wrap:wrap}

/* ═══════════════════════════════════════════
   BUTTONS
═══════════════════════════════════════════ */
button{
  font-family:var(--font-ui);font-weight:600;font-size:.8rem;letter-spacing:.05em;
  padding:5px 13px;border-radius:var(--radius);border:1px solid var(--accent);
  background:transparent;color:var(--accent);cursor:pointer;white-space:nowrap;
  transition:background .16s,color .16s,border-color .16s;
}
button:hover{background:var(--accent);color:var(--bg)}
button:disabled{opacity:.35;cursor:not-allowed}
#btn-theme{border-color:var(--muted);color:var(--muted);padding:5px 9px;font-size:.95rem;line-height:1}
#btn-theme:hover{background:transparent;color:var(--warn);border-color:var(--warn)}
#rbadge{font-family:var(--font-mono);font-size:.67rem;color:var(--muted);white-space:nowrap}
#rbadge.live{color:var(--accent)}

/* ═══════════════════════════════════════════
   SYMBOL PANEL
═══════════════════════════════════════════ */
#spanel{
  background:var(--surface);border-bottom:1px solid var(--border);
  padding:10px 20px;display:flex;flex-wrap:wrap;gap:9px;align-items:center;
  transition:background .22s;
}
#spanel > label{font-family:var(--font-mono);font-size:.7rem;color:var(--muted);text-transform:uppercase;letter-spacing:.1em;white-space:nowrap}
#sym-input{
  flex:1;min-width:220px;background:var(--bg);border:1px solid var(--border);
  border-radius:var(--radius);color:var(--text);font-family:var(--font-mono);
  font-size:.8rem;padding:5px 11px;outline:none;transition:border-color .18s,background .22s,color .22s;
}
#sym-input:focus{border-color:var(--accent)}
.hint{font-size:.67rem;color:var(--muted);font-family:var(--font-mono)}
/* upload */
#file-in{display:none}
.ulabel{
  display:inline-flex;align-items:center;gap:5px;
  font-family:var(--font-ui);font-weight:600;font-size:.8rem;letter-spacing:.04em;
  padding:5px 13px;border-radius:var(--radius);border:1px dashed var(--accent);
  background:transparent;color:var(--accent);cursor:pointer;white-space:nowrap;
  transition:background .16s,color .16s;
}
.ulabel:hover{background:var(--accent);color:var(--bg)}
#fbadge{
  font-family:var(--font-mono);font-size:.67rem;color:var(--accent);
  background:rgba(0,212,170,.09);border:1px solid rgba(0,212,170,.25);
  border-radius:4px;padding:3px 8px;display:none;white-space:nowrap;
}

/* ═══════════════════════════════════════════
   STATUS
═══════════════════════════════════════════ */
#sbar{
  padding:4px 20px;font-family:var(--font-mono);font-size:.68rem;
  color:var(--muted);border-bottom:1px solid var(--border);min-height:24px;
  background:var(--surface2);transition:background .22s;
}
#sbar .ok{color:var(--accent)} #sbar .err{color:var(--danger)} #sbar .warn{color:var(--warn)}

/* ═══════════════════════════════════════════
   GRID
═══════════════════════════════════════════ */
#grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(480px,1fr));gap:14px;padding:16px 20px}

/* ═══════════════════════════════════════════
   CARD
═══════════════════════════════════════════ */
.card{
  background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);
  overflow:hidden;transition:border-color .18s,box-shadow .18s,background .22s;
}
.card:hover{border-color:var(--accent);box-shadow:0 0 0 1px color-mix(in srgb,var(--accent) 18%,transparent)}
.card-head{display:flex;justify-content:space-between;align-items:center;padding:8px 13px 6px;border-bottom:1px solid var(--border)}
.csym{font-family:var(--font-mono);font-size:.86rem;color:var(--accent);letter-spacing:.07em;font-weight:700}
.cmeta{font-size:.68rem;color:var(--muted);display:flex;gap:9px;flex-wrap:wrap;justify-content:flex-end}
.cmeta span{white-space:nowrap}
.thi{color:var(--hline-hi)!important} .tlo{color:var(--hline-lo)!important}
.cbody{padding:6px 10px 8px;height:210px;position:relative;background:var(--chart-bg);transition:background .22s}
.cbody canvas{display:block;width:100%!important;height:100%!important}
/* skeleton */
.skel{height:210px;background:linear-gradient(90deg,var(--skel-a) 25%,var(--skel-b) 50%,var(--skel-a) 75%);background-size:200% 100%;animation:shim 1.3s infinite}
@keyframes shim{0%{background-position:200% 0}100%{background-position:-200% 0}}
.errcard{display:flex;align-items:center;justify-content:center;height:210px;color:var(--danger);font-family:var(--font-mono);font-size:.74rem;padding:0 18px;text-align:center}
/* legend */
.leg{padding:3px 13px 7px;display:flex;gap:13px;flex-wrap:wrap;font-size:.65rem;font-family:var(--font-mono);color:var(--muted)}
.dot{display:inline-block;width:9px;height:3px;border-radius:2px;margin-right:4px;vertical-align:middle}

@media(max-width:580px){
  #grid{grid-template-columns:1fr;padding:9px}
  header,#spanel{padding:9px 12px}
}
</style>
</head>
<body>

<!-- ============================================================
  ★  SYMBOL LIST — edit here OR upload a .txt file live
     NSE = .NS    BSE = .BO    One symbol per line in .txt
============================================================ -->
<script>
const SYMBOLS = [
  "KAYNES.NS","360ONE.NS","ABB.NS","ABCAPITAL.NS","ANGELONE.NS","ITC.NS",
  // "RELIANCE.NS","HDFCBANK.NS","INFY.NS",
];
const INTERVAL       = "15m";   // 1m 2m 5m 15m 30m 60m
const PERIOD         = "1d";    // 1d 5d
const AUTO_REFRESH_S = 300;     // auto-refresh seconds (0 = off)
</script>

<!-- HEADER -->
<header>
  <h1>▣ Intraday <span>Dashboard</span></h1>
  <div class="hctrl">
    <span id="rbadge">—</span>
    <button id="btn-ref" onclick="loadAll()">↻ Refresh</button>
    <button id="btn-theme" onclick="toggleTheme()" title="Day / Night">🌙</button>
  </div>
  <span id="clock"></span>
</header>

<!-- SYMBOL PANEL -->
<div id="spanel">
  <label>Symbols ›</label>
  <input id="sym-input" type="text" placeholder="RELIANCE.NS, HDFCBANK.NS …"/>
  <button onclick="applyInput()">Apply</button>
  <input type="file" id="file-in" accept=".txt,.csv"/>
  <label for="file-in" class="ulabel">
    <svg width="12" height="12" viewBox="0 0 16 16" fill="currentColor">
      <path d="M8 1a.5.5 0 0 1 .5.5v7.793l2.146-2.147a.5.5 0 0 1 .708.708l-3 3a.5.5 0 0 1-.708 0l-3-3a.5.5 0 1 1 .708-.708L7.5 9.293V1.5A.5.5 0 0 1 8 1z"/>
      <path d="M2 12a.5.5 0 0 1 .5-.5h11a.5.5 0 0 1 0 1h-11A.5.5 0 0 1 2 12z"/>
    </svg>Upload .txt
  </label>
  <span id="fbadge"></span>
  <span class="hint">.txt = one symbol per line · .NS = NSE · .BO = BSE</span>
</div>

<!-- STATUS -->
<div id="sbar">Ready.</div>

<!-- GRID -->
<div id="grid"></div>

<script>
// ═══════════════════════════════════════════════════════
//  STATE
// ═══════════════════════════════════════════════════════
let active   = [...SYMBOLS];
let cdTimer  = null;
let cdVal    = AUTO_REFRESH_S;
let isDark   = true;

// ═══════════════════════════════════════════════════════
//  CLOCK
// ═══════════════════════════════════════════════════════
const clockEl = document.getElementById('clock');
function tick(){ clockEl.textContent = new Date().toLocaleTimeString('en-IN',{hour12:false,timeZone:'Asia/Kolkata'})+' IST' }
setInterval(tick,1000); tick();

// ═══════════════════════════════════════════════════════
//  THEME
// ═══════════════════════════════════════════════════════
function toggleTheme(){
  isDark = !isDark;
  document.documentElement.setAttribute('data-theme', isDark?'dark':'light');
  document.getElementById('btn-theme').textContent = isDark?'🌙':'☀️';
  loadAll();
}

// ═══════════════════════════════════════════════════════
//  SYMBOL INPUT
// ═══════════════════════════════════════════════════════
const symInput = document.getElementById('sym-input');
symInput.value = active.join(', ');
function applyInput(){
  const v = symInput.value.trim();
  if(!v) return;
  active = v.split(',').map(s=>s.trim().toUpperCase()).filter(Boolean);
  document.getElementById('fbadge').style.display='none';
  loadAll();
}
symInput.addEventListener('keydown', e=>{ if(e.key==='Enter') applyInput(); });

// ═══════════════════════════════════════════════════════
//  FILE UPLOAD
// ═══════════════════════════════════════════════════════
document.getElementById('file-in').addEventListener('change', function(){
  const f = this.files[0]; if(!f) return;
  const r = new FileReader();
  r.onload = e => {
    const syms = e.target.result.split(/[\n,\r]+/).map(s=>s.trim().toUpperCase()).filter(s=>s&&!s.startsWith('#'));
    if(!syms.length){ setS('⚠ No valid symbols in file','err'); return; }
    active = syms;
    symInput.value = syms.join(', ');
    const b = document.getElementById('fbadge');
    b.textContent = `📄 ${f.name} (${syms.length})`;
    b.style.display = 'inline';
    setS(`Loaded ${syms.length} symbols from "${f.name}"`, 'ok');
    loadAll();
  };
  r.readAsText(f);
  this.value='';
});

// ═══════════════════════════════════════════════════════
//  DATA FETCH — multi-proxy with retry
// ═══════════════════════════════════════════════════════
const PROXIES = [
  u => `https://api.allorigins.win/get?url=${encodeURIComponent(u)}`,
  u => `https://corsproxy.io/?${encodeURIComponent(u)}`,
  u => `https://api.codetabs.com/v1/proxy?quest=${encodeURIComponent(u)}`,
];

async function fetchViaProxy(symbol, proxyIdx=0) {
  const yUrl = `https://query1.finance.yahoo.com/v8/finance/chart/${encodeURIComponent(symbol)}?interval=${INTERVAL}&range=${PERIOD}&includePrePost=false`;
  const proxy = PROXIES[proxyIdx];
  const pUrl  = proxy(yUrl);

  const ctrl = new AbortController();
  const tid  = setTimeout(()=>ctrl.abort(), 8000); // 8s timeout per attempt

  try {
    const res = await fetch(pUrl, {signal: ctrl.signal});
    clearTimeout(tid);
    if(!res.ok) throw new Error(`HTTP ${res.status}`);

    let raw;
    const ct = res.headers.get('content-type')||'';
    if(ct.includes('application/json')){
      raw = await res.json();
      // allorigins wraps in {contents:"..."}
      if(typeof raw.contents === 'string') raw = JSON.parse(raw.contents);
      // codetabs returns direct JSON
    } else {
      const txt = await res.text();
      raw = JSON.parse(txt);
    }

    const result = raw?.chart?.result?.[0];
    if(!result) throw new Error('Empty chart result');

    const ts = result.timestamp;
    const q  = result.indicators.quote[0];
    const candles = ts.map((t,i)=>({
      t: t*1000, o: q.open[i], h: q.high[i], l: q.low[i], c: q.close[i]
    })).filter(c=>c.o!=null&&c.h!=null&&c.l!=null&&c.c!=null);

    if(!candles.length) throw new Error('Zero valid candles');
    return candles;

  } catch(err) {
    clearTimeout(tid);
    if(proxyIdx+1 < PROXIES.length){
      return fetchViaProxy(symbol, proxyIdx+1); // try next proxy
    }
    throw new Error('All proxies failed: '+err.message);
  }
}

// ═══════════════════════════════════════════════════════
//  PURE CANVAS CANDLESTICK RENDERER  (no Chart.js)
//  Matches Python/mplfinance output exactly
// ═══════════════════════════════════════════════════════
function drawCandles(canvas, candles) {
  const dpr  = window.devicePixelRatio || 1;
  const W    = canvas.clientWidth  || canvas.width;
  const H    = canvas.clientHeight || canvas.height;
  canvas.width  = W * dpr;
  canvas.height = H * dpr;
  const ctx  = canvas.getContext('2d');
  ctx.scale(dpr, dpr);

  const s = getComputedStyle(document.documentElement);
  const g = v => s.getPropertyValue(v).trim();
  const BULL_FILL  = g('--bull-fill');
  const BEAR_FILL  = g('--bear-fill');
  const BULL_WICK  = g('--bull-wick');
  const BEAR_WICK  = g('--bear-wick');
  const BULL_EDGE  = g('--bull-edge');
  const BEAR_EDGE  = g('--bear-edge');
  const HLINE_HI   = g('--hline-hi');
  const HLINE_LO   = g('--hline-lo');
  const GRID_COL   = g('--chart-grid');
  const TICK_COL   = g('--chart-tick') || '#4a5568';
  const CHART_BG   = g('--chart-bg');

  // margins
  const ML=6, MR=48, MT=10, MB=22;
  const cW = W - ML - MR;
  const cH = H - MT - MB;

  // price range with 3% padding
  const prices = candles.flatMap(c=>[c.h,c.l]);
  let minP = Math.min(...prices);
  let maxP = Math.max(...prices);
  const pad = (maxP - minP) * 0.06 || 1;
  minP -= pad; maxP += pad;
  const pRange = maxP - minP;

  // helpers
  const px = i => ML + (i / (candles.length-1||1)) * cW;
  const py = p => MT + cH - ((p - minP) / pRange) * cH;

  // background
  ctx.fillStyle = CHART_BG;
  ctx.fillRect(0, 0, W, H);

  // grid lines (5 horizontal)
  ctx.strokeStyle = GRID_COL;
  ctx.lineWidth = 1;
  for(let i=0;i<=4;i++){
    const y = MT + (cH/4)*i;
    ctx.beginPath(); ctx.moveTo(ML,y); ctx.lineTo(ML+cW,y); ctx.stroke();
  }

  // Y-axis labels
  ctx.fillStyle = TICK_COL;
  ctx.font = `10px ${g('--font-mono')||'monospace'}`;
  ctx.textAlign = 'left';
  for(let i=0;i<=4;i++){
    const val = maxP - (pRange/4)*i;
    const y   = MT + (cH/4)*i;
    ctx.fillText(val.toFixed(1), ML+cW+4, y+4);
  }

  // first-candle H/L dashed lines
  const fH = candles[0].h;
  const fL = candles[0].l;
  [[fH, HLINE_HI],[fL, HLINE_LO]].forEach(([val, col])=>{
    const y = py(val);
    ctx.save();
    ctx.strokeStyle = col;
    ctx.lineWidth   = 1.2;
    ctx.setLineDash([5,4]);
    ctx.beginPath(); ctx.moveTo(ML,y); ctx.lineTo(ML+cW,y); ctx.stroke();
    ctx.restore();
  });

  // candle width
  const slotW = cW / candles.length;
  const cand  = Math.max(1, Math.min(slotW * 0.72, 12));

  // draw candles
  candles.forEach((c, i) => {
    const x    = ML + slotW*i + slotW/2;
    const bull = c.c >= c.o;
    const fill = bull ? BULL_FILL : BEAR_FILL;
    const edge = bull ? BULL_EDGE : BEAR_EDGE;
    const wick = bull ? BULL_WICK : BEAR_WICK;

    const yH   = py(c.h);
    const yL   = py(c.l);
    const yO   = py(c.o);
    const yC   = py(c.c);
    const top  = Math.min(yO, yC);
    const bot  = Math.max(yO, yC);
    const bH   = Math.max(1, bot - top);

    // wick
    ctx.strokeStyle = wick;
    ctx.lineWidth   = 1;
    ctx.setLineDash([]);
    ctx.beginPath(); ctx.moveTo(x, yH); ctx.lineTo(x, yL); ctx.stroke();

    // body
    ctx.fillStyle   = fill;
    ctx.strokeStyle = edge;
    ctx.lineWidth   = 1;
    ctx.fillRect(x - cand/2, top, cand, bH);
    ctx.strokeRect(x - cand/2, top, cand, bH);
  });

  // X-axis time labels (max 6, skip non-trading gaps)
  ctx.fillStyle  = TICK_COL;
  ctx.textAlign  = 'center';
  ctx.font       = `10px ${g('--font-mono')||'monospace'}`;
  const step = Math.max(1, Math.round(candles.length / 5));
  for(let i=0; i<candles.length; i+=step){
    const c  = candles[i];
    const d  = new Date(c.t);
    const hh = d.getHours().toString().padStart(2,'0');
    const mm = d.getMinutes().toString().padStart(2,'0');
    const xp = ML + slotW*i + slotW/2;
    ctx.fillText(`${hh}:${mm}`, xp, H-5);
  }
}

// ═══════════════════════════════════════════════════════
//  BUILD CARD (skeleton)
// ═══════════════════════════════════════════════════════
function buildCard(sym){
  const id   = 'c_'+sym.replace(/[^a-zA-Z0-9]/g,'_');
  const card = document.createElement('div');
  card.className='card'; card.id='card_'+id;
  card.innerHTML=`
    <div class="card-head">
      <span class="csym">${sym}</span>
      <div class="cmeta" id="meta_${id}"><span class="thi">H1: —</span><span class="tlo">L1: —</span><span>loading…</span></div>
    </div>
    <div class="skel" id="skel_${id}"></div>`;
  return {card,id};
}

// ═══════════════════════════════════════════════════════
//  RENDER INTO CARD
// ═══════════════════════════════════════════════════════
function renderCard(card, id, sym, candles){
  document.getElementById('skel_'+id)?.remove();
  card.querySelector('.cbody')?.remove();
  card.querySelector('.leg')?.remove();

  const fH  = candles[0].h, fL = candles[0].l;
  const lC  = candles[candles.length-1].c;
  const chg = ((lC - candles[0].o)/candles[0].o*100).toFixed(2);
  const chgCol = +chg>=0 ? 'var(--accent)' : 'var(--danger)';

  const meta = document.getElementById('meta_'+id);
  if(meta) meta.innerHTML=`
    <span class="thi">H1: ${fH.toFixed(2)}</span>
    <span class="tlo">L1: ${fL.toFixed(2)}</span>
    <span>${candles.length} cdl</span>
    <span>LTP <b>${lC.toFixed(2)}</b></span>
    <span style="color:${chgCol}">${+chg>=0?'+':''}${chg}%</span>`;

  const body   = document.createElement('div'); body.className='cbody';
  const canvas = document.createElement('canvas');
  body.appendChild(canvas);
  card.appendChild(body);

  const leg = document.createElement('div'); leg.className='leg';
  leg.innerHTML=`
    <span><span class="dot" style="background:var(--hline-hi)"></span><span class="thi">1st High</span></span>
    <span><span class="dot" style="background:var(--hline-lo)"></span><span class="tlo">1st Low</span></span>
    <span><span class="dot" style="background:var(--bull-fill);border:1px solid var(--bull-edge)"></span>Bullish</span>
    <span><span class="dot" style="background:var(--bear-fill);border:1px solid var(--bear-edge)"></span>Bearish</span>`;
  card.appendChild(leg);

  // Draw once body is in DOM (so clientWidth is set)
  requestAnimationFrame(()=> drawCandles(canvas, candles));

  // Redraw on resize
  const ro = new ResizeObserver(()=> drawCandles(canvas, candles));
  ro.observe(body);
}

// ═══════════════════════════════════════════════════════
//  RENDER ERROR
// ═══════════════════════════════════════════════════════
function renderError(card, id, msg){
  document.getElementById('skel_'+id)?.remove();
  const d = document.createElement('div'); d.className='errcard';
  d.textContent=`⚠ ${msg}`; card.appendChild(d);
}

// ═══════════════════════════════════════════════════════
//  LOAD ALL
// ═══════════════════════════════════════════════════════
async function loadAll(){
  document.getElementById('btn-ref').disabled=true;
  setS('Fetching data…','warn');
  document.getElementById('grid').innerHTML='';

  const results = await Promise.all(active.map(async sym=>{
    const {card,id} = buildCard(sym);
    document.getElementById('grid').appendChild(card);
    try{
      const candles = await fetchViaProxy(sym);
      renderCard(card,id,sym,candles);
      return {sym,ok:true};
    } catch(e){
      renderError(card,id,e.message||'Failed');
      return {sym,ok:false};
    }
  }));

  const ok  = results.filter(r=>r.ok).length;
  const bad = results.filter(r=>!r.ok).map(r=>r.sym);
  const errStr = bad.length ? `  ·  ⚠ ${bad.join(', ')}` : '';
  const t = new Date().toLocaleTimeString('en-IN',{timeZone:'Asia/Kolkata'});
  setS(`✓ ${ok}/${active.length} loaded${errStr}  ·  ${t} IST`, ok===active.length?'ok':'warn');
  document.getElementById('btn-ref').disabled=false;
  resetCD();
}

// ═══════════════════════════════════════════════════════
//  STATUS
// ═══════════════════════════════════════════════════════
function setS(msg,cls=''){
  document.getElementById('sbar').innerHTML=`<span class="${cls}">${msg}</span>`;
}

// ═══════════════════════════════════════════════════════
//  COUNTDOWN
// ═══════════════════════════════════════════════════════
function resetCD(){
  clearInterval(cdTimer);
  const b = document.getElementById('rbadge');
  if(AUTO_REFRESH_S<=0){ b.textContent='manual'; b.className=''; return; }
  cdVal=AUTO_REFRESH_S; b.className='live';
  cdTimer=setInterval(()=>{
    cdVal--;
    b.textContent=`↻ ${cdVal}s`;
    if(cdVal<=0){ clearInterval(cdTimer); loadAll(); }
  },1000);
}

// ═══════════════════════════════════════════════════════
//  INIT
// ═══════════════════════════════════════════════════════
loadAll();
</script>
