<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Intraday Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Rajdhani:wght@400;600;700&display=swap" rel="stylesheet"/>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.2/dist/chart.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chartjs-chart-financial@0.1.1/dist/chartjs-chart-financial.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/luxon@3.4.4/build/global/luxon.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chartjs-adapter-luxon@1.3.1/dist/chartjs-adapter-luxon.umd.min.js"></script>

<style>
  /* ── DESIGN TOKENS ── */
  :root {
    --bg:       #0b0e14;
    --surface:  #111520;
    --border:   #1e2535;
    --accent:   #00d4aa;
    --warn:     #f7c948;
    --bull:     #f5f07a;   /* light-yellow, same as Python */
    --bear:     #111520;   /* black fill */
    --bear-border: #e0e0e0;
    --text:     #c9d1e0;
    --muted:    #4a5568;
    --hline-hi: #4fa3ff;
    --hline-lo: #ff8c42;
    --font-mono: 'Share Tech Mono', monospace;
    --font-ui:   'Rajdhani', sans-serif;
    --radius:    6px;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--font-ui);
    min-height: 100vh;
  }

  /* ── HEADER ── */
  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 14px 24px;
    border-bottom: 1px solid var(--border);
    background: var(--surface);
    position: sticky; top: 0; z-index: 100;
  }
  header h1 {
    font-family: var(--font-mono);
    font-size: 1.1rem;
    color: var(--accent);
    letter-spacing: 0.12em;
    text-transform: uppercase;
  }
  header h1 span { color: var(--warn); }
  #clock {
    font-family: var(--font-mono);
    font-size: 0.85rem;
    color: var(--muted);
  }
  .header-controls { display: flex; gap: 10px; align-items: center; }
  button {
    font-family: var(--font-ui);
    font-weight: 600;
    font-size: 0.85rem;
    letter-spacing: 0.06em;
    padding: 6px 16px;
    border-radius: var(--radius);
    border: 1px solid var(--accent);
    background: transparent;
    color: var(--accent);
    cursor: pointer;
    transition: background 0.2s, color 0.2s;
  }
  button:hover { background: var(--accent); color: var(--bg); }
  button:disabled { opacity: 0.35; cursor: not-allowed; }

  /* ── SYMBOL EDITOR ── */
  #symbol-panel {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 14px 24px;
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
    align-items: center;
  }
  #symbol-panel label {
    font-family: var(--font-mono);
    font-size: 0.75rem;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.1em;
    white-space: nowrap;
  }
  #symbol-input {
    flex: 1;
    min-width: 260px;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    color: var(--text);
    font-family: var(--font-mono);
    font-size: 0.85rem;
    padding: 6px 12px;
    outline: none;
    transition: border-color 0.2s;
  }
  #symbol-input:focus { border-color: var(--accent); }
  .hint {
    font-size: 0.72rem;
    color: var(--muted);
    font-family: var(--font-mono);
  }

  /* ── STATUS BAR ── */
  #status-bar {
    padding: 6px 24px;
    font-family: var(--font-mono);
    font-size: 0.72rem;
    color: var(--muted);
    border-bottom: 1px solid var(--border);
    min-height: 28px;
  }
  #status-bar .ok  { color: var(--accent); }
  #status-bar .err { color: #f66; }
  #status-bar .warn{ color: var(--warn); }

  /* ── GRID ── */
  #grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(520px, 1fr));
    gap: 16px;
    padding: 20px 24px;
  }

  /* ── CHART CARD ── */
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
    position: relative;
    transition: border-color 0.2s;
  }
  .card:hover { border-color: #2a3550; }

  .card-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 10px 14px 8px;
    border-bottom: 1px solid var(--border);
  }
  .card-symbol {
    font-family: var(--font-mono);
    font-size: 0.9rem;
    color: var(--accent);
    letter-spacing: 0.08em;
  }
  .card-meta {
    font-size: 0.72rem;
    color: var(--muted);
    display: flex;
    gap: 14px;
  }
  .card-meta span { white-space: nowrap; }
  .tag-hi { color: var(--hline-hi); }
  .tag-lo { color: var(--hline-lo); }

  .card-body {
    padding: 10px 14px 12px;
    position: relative;
    height: 220px;
  }
  .card-body canvas { width: 100% !important; height: 100% !important; }

  /* skeleton loader */
  .skeleton {
    height: 220px;
    background: linear-gradient(90deg, var(--border) 25%, #1e2a3a 50%, var(--border) 75%);
    background-size: 200% 100%;
    animation: shimmer 1.4s infinite;
    border-radius: 0 0 var(--radius) var(--radius);
  }
  @keyframes shimmer { 0%{background-position:200% 0} 100%{background-position:-200% 0} }

  .error-card {
    display: flex; align-items: center; justify-content: center;
    height: 220px; color: #f66;
    font-family: var(--font-mono); font-size: 0.78rem;
  }

  /* legend strip */
  .legend-strip {
    padding: 4px 14px 8px;
    display: flex; gap: 18px;
    font-size: 0.7rem; font-family: var(--font-mono);
  }
  .legend-strip .dot { display: inline-block; width: 10px; height: 3px; border-radius: 2px; margin-right: 5px; vertical-align: middle; }

  /* auto-refresh badge */
  #refresh-badge {
    font-family: var(--font-mono);
    font-size: 0.7rem;
    color: var(--muted);
    white-space: nowrap;
  }
  #refresh-badge.live { color: var(--accent); }

  /* ── RESPONSIVE ── */
  @media (max-width: 600px) {
    #grid { grid-template-columns: 1fr; padding: 12px; }
    header { padding: 10px 14px; }
    #symbol-panel { padding: 10px 14px; }
  }
</style>
</head>
<body>

<!-- ============================================================
     ★  SYMBOL LIST — EDIT THIS TO CHANGE WHAT YOU TRACK  ★
     Add/remove NSE symbols ending in .NS, BSE ending in .BO
     ============================================================ -->
<script>
const SYMBOLS = [
  "KAYNES.NS",
  "360ONE.NS",
  "ABB.NS",
  "ABCAPITAL.NS",
  "ANGELONE.NS",
  // Add more below, e.g.:
  // "RELIANCE.NS",
  // "HDFCBANK.NS",
  // "INFY.NS",
];

// ── CONFIG ──────────────────────────────────────
const INTERVAL       = "15m";   // candle interval: 1m 2m 5m 15m 30m 60m
const PERIOD         = "1d";    // data period: 1d 5d
const AUTO_REFRESH_S = 300;     // auto-refresh every N seconds (0 = off)
// ─────────────────────────────────────────────────
</script>

<!-- HEADER -->
<header>
  <h1>⬛ Intraday <span>Dashboard</span></h1>
  <div class="header-controls">
    <span id="refresh-badge">—</span>
    <button id="btn-refresh" onclick="loadAll()">↻ Refresh</button>
  </div>
  <span id="clock"></span>
</header>

<!-- SYMBOL EDITOR -->
<div id="symbol-panel">
  <label>Symbols ›</label>
  <input id="symbol-input" type="text" placeholder="RELIANCE.NS, HDFCBANK.NS, INFY.NS …" />
  <button onclick="applySymbolInput()">Apply</button>
  <span class="hint">Comma-separated · .NS = NSE · .BO = BSE</span>
</div>

<!-- STATUS -->
<div id="status-bar">Ready.</div>

<!-- CHART GRID -->
<div id="grid"></div>


<script>
// ── CORS proxy that wraps Yahoo Finance ──────────────────────────────────────
// allorigins.win forwards any URL through CORS-safe JSON wrapper
function yahooUrl(symbol) {
  const base = `https://query1.finance.yahoo.com/v8/finance/chart/${encodeURIComponent(symbol)}`;
  const params = `?interval=${INTERVAL}&range=${PERIOD}&includePrePost=false`;
  return `https://api.allorigins.win/get?url=${encodeURIComponent(base + params)}`;
}

// ── State ────────────────────────────────────────────────────────────────────
let activeSymbols = [...SYMBOLS];
let refreshTimer  = null;
let countdownVal  = AUTO_REFRESH_S;
let countdownTimer= null;

// ── Clock ────────────────────────────────────────────────────────────────────
function updateClock() {
  const now = new Date();
  document.getElementById('clock').textContent =
    now.toLocaleTimeString('en-IN', {hour12: false, timeZone: 'Asia/Kolkata'}) + ' IST';
}
setInterval(updateClock, 1000);
updateClock();

// ── Symbol input init ────────────────────────────────────────────────────────
function applySymbolInput() {
  const raw = document.getElementById('symbol-input').value.trim();
  if (!raw) return;
  activeSymbols = raw.split(',').map(s => s.trim().toUpperCase()).filter(Boolean);
  loadAll();
}
document.getElementById('symbol-input').value = activeSymbols.join(', ');

// ── Fetch one symbol ─────────────────────────────────────────────────────────
async function fetchSymbol(symbol) {
  const res  = await fetch(yahooUrl(symbol));
  if (!res.ok) throw new Error(`HTTP ${res.status}`);
  const wrap = await res.json();
  const data = JSON.parse(wrap.contents);
  const result = data?.chart?.result?.[0];
  if (!result) throw new Error('No data');

  const timestamps = result.timestamp;
  const q = result.indicators.quote[0];

  const candles = timestamps.map((ts, i) => ({
    x: ts * 1000,
    o: q.open[i],
    h: q.high[i],
    l: q.low[i],
    c: q.close[i],
  })).filter(c => c.o != null && c.h != null && c.l != null && c.c != null);

  return candles;
}

// ── Build one chart card ──────────────────────────────────────────────────────
function buildCard(symbol) {
  const id = 'chart-' + symbol.replace(/[^a-zA-Z0-9]/g, '_');
  const card = document.createElement('div');
  card.className = 'card';
  card.id = 'card-' + id;
  card.innerHTML = `
    <div class="card-header">
      <span class="card-symbol">${symbol}</span>
      <div class="card-meta" id="meta-${id}">
        <span class="tag-hi">H1: —</span>
        <span class="tag-lo">L1: —</span>
        <span id="candle-count-${id}">— candles</span>
      </div>
    </div>
    <div class="skeleton" id="skel-${id}"></div>
  `;
  return { card, id };
}

// ── Render chart into card ────────────────────────────────────────────────────
function renderChart(card, id, symbol, candles) {
  // Remove skeleton
  const skel = document.getElementById('skel-' + id);
  if (skel) skel.remove();

  // Remove old body if exists
  const oldBody = card.querySelector('.card-body');
  if (oldBody) oldBody.remove();
  const oldLegend = card.querySelector('.legend-strip');
  if (oldLegend) oldLegend.remove();

  const firstHigh = candles[0].h;
  const firstLow  = candles[0].l;
  const lastClose = candles[candles.length - 1].c;

  // Update meta
  const metaEl = document.getElementById('meta-' + id);
  if (metaEl) {
    metaEl.innerHTML = `
      <span class="tag-hi">H1: ${firstHigh.toFixed(2)}</span>
      <span class="tag-lo">L1: ${firstLow.toFixed(2)}</span>
      <span id="candle-count-${id}">${candles.length} candles · LTP ${lastClose.toFixed(2)}</span>
    `;
  }

  // Body
  const body = document.createElement('div');
  body.className = 'card-body';
  const canvas = document.createElement('canvas');
  body.appendChild(canvas);
  card.appendChild(body);

  // Legend
  const leg = document.createElement('div');
  leg.className = 'legend-strip';
  leg.innerHTML = `
    <span><span class="dot" style="background:var(--hline-hi)"></span><span class="tag-hi">1st Candle High</span></span>
    <span><span class="dot" style="background:var(--hline-lo)"></span><span class="tag-lo">1st Candle Low</span></span>
    <span><span class="dot" style="background:var(--bull); border:1px solid #888"></span>Bullish</span>
    <span><span class="dot" style="background:var(--bear); border:1px solid var(--bear-border)"></span>Bearish</span>
  `;
  card.appendChild(leg);

  // Annotation horizontal lines via custom plugin
  const hlinePlugin = {
    id: 'hlines',
    afterDraw(chart) {
      const { ctx, chartArea: { left, right }, scales: { y } } = chart;
      [[firstHigh, getComputedStyle(document.documentElement).getPropertyValue('--hline-hi').trim()],
       [firstLow,  getComputedStyle(document.documentElement).getPropertyValue('--hline-lo').trim()]
      ].forEach(([val, color]) => {
        const yPx = y.getPixelForValue(val);
        ctx.save();
        ctx.strokeStyle = color || '#4fa3ff';
        ctx.lineWidth = 1;
        ctx.setLineDash([4, 4]);
        ctx.beginPath();
        ctx.moveTo(left, yPx);
        ctx.lineTo(right, yPx);
        ctx.stroke();
        ctx.restore();
      });
    }
  };

  new Chart(canvas, {
    type: 'candlestick',
    data: {
      datasets: [{
        label: symbol,
        data: candles,
        color: {
          up:   getComputedStyle(document.documentElement).getPropertyValue('--bull').trim() || '#f5f07a',
          down: getComputedStyle(document.documentElement).getPropertyValue('--bear').trim() || '#111520',
          unchanged: '#888',
        },
        borderColor: {
          up:   '#aaa',
          down: getComputedStyle(document.documentElement).getPropertyValue('--bear-border').trim() || '#e0e0e0',
          unchanged: '#888',
        },
      }]
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      animation: false,
      plugins: {
        legend: { display: false },
        tooltip: {
          callbacks: {
            label: ctx => {
              const d = ctx.raw;
              return [`O: ${d.o?.toFixed(2)}  H: ${d.h?.toFixed(2)}  L: ${d.l?.toFixed(2)}  C: ${d.c?.toFixed(2)}`];
            }
          },
          backgroundColor: '#1a2035',
          titleColor: '#c9d1e0',
          bodyColor: '#c9d1e0',
          borderColor: '#2a3550',
          borderWidth: 1,
          titleFont: { family: "'Share Tech Mono'" },
          bodyFont:  { family: "'Share Tech Mono'", size: 11 },
        }
      },
      scales: {
        x: {
          type: 'time',
          time: { unit: 'hour', displayFormats: { hour: 'HH:mm' } },
          ticks: {
            color: '#4a5568',
            font: { family: "'Share Tech Mono'", size: 10 },
            maxRotation: 0,
            autoSkip: true,
            maxTicksLimit: 6,
          },
          grid: { color: '#1a1f2e' },
        },
        y: {
          position: 'right',
          ticks: {
            color: '#4a5568',
            font: { family: "'Share Tech Mono'", size: 10 },
            maxTicksLimit: 5,
          },
          grid: { color: '#1a1f2e' },
        }
      }
    },
    plugins: [hlinePlugin]
  });
}

// ── Show error in card ────────────────────────────────────────────────────────
function renderError(card, id, msg) {
  const skel = document.getElementById('skel-' + id);
  if (skel) skel.remove();
  const errDiv = document.createElement('div');
  errDiv.className = 'error-card';
  errDiv.textContent = `⚠ ${msg}`;
  card.appendChild(errDiv);
}

// ── Load all symbols ──────────────────────────────────────────────────────────
async function loadAll() {
  document.getElementById('btn-refresh').disabled = true;
  setStatus('Fetching data…', 'warn');

  // Rebuild grid
  const grid = document.getElementById('grid');
  grid.innerHTML = '';

  // Destroy old charts
  Chart.helpers?.each(Chart.instances, c => c.destroy?.());

  const promises = activeSymbols.map(async symbol => {
    const { card, id } = buildCard(symbol);
    grid.appendChild(card);

    try {
      const candles = await fetchSymbol(symbol);
      renderChart(card, id, symbol, candles);
      return { symbol, ok: true };
    } catch(e) {
      renderError(card, id, e.message || 'Failed');
      return { symbol, ok: false, err: e.message };
    }
  });

  const results = await Promise.all(promises);
  const ok  = results.filter(r => r.ok).length;
  const bad = results.filter(r => !r.ok);
  const errMsg = bad.length ? ` · Failed: ${bad.map(r=>r.symbol).join(', ')}` : '';
  setStatus(`Loaded ${ok}/${activeSymbols.length} symbols${errMsg} · ${new Date().toLocaleTimeString('en-IN',{timeZone:'Asia/Kolkata'})} IST`, ok === activeSymbols.length ? 'ok' : 'warn');

  document.getElementById('btn-refresh').disabled = false;
  resetCountdown();
}

function setStatus(msg, cls='') {
  const el = document.getElementById('status-bar');
  el.innerHTML = `<span class="${cls}">${msg}</span>`;
}

// ── Auto-refresh countdown ────────────────────────────────────────────────────
function resetCountdown() {
  clearInterval(countdownTimer);
  clearTimeout(refreshTimer);
  if (AUTO_REFRESH_S <= 0) {
    document.getElementById('refresh-badge').textContent = 'manual refresh';
    return;
  }
  countdownVal = AUTO_REFRESH_S;
  const badge = document.getElementById('refresh-badge');
  badge.className = 'live';

  countdownTimer = setInterval(() => {
    countdownVal--;
    badge.textContent = `↻ in ${countdownVal}s`;
    if (countdownVal <= 0) {
      clearInterval(countdownTimer);
      loadAll();
    }
  }, 1000);
}

// ── Init ──────────────────────────────────────────────────────────────────────
document.getElementById('symbol-input').addEventListener('keydown', e => {
  if (e.key === 'Enter') applySymbolInput();
});

loadAll();
</script>
</body>
</html>
