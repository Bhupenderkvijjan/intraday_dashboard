<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Intraday Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Rajdhani:wght@400;600;700&display=swap" rel="stylesheet"/>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.2/dist/chart.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chartjs-chart-financial@0.1.1/dist/chartjs-chart-financial.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/luxon@3.4.4/build/global/luxon.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chartjs-adapter-luxon@1.3.1/dist/chartjs-adapter-luxon.umd.min.js"></script>

<style>
/* ══════════════════════════════════════════
   THEME TOKENS
══════════════════════════════════════════ */
:root,
[data-theme="dark"] {
  --bg:          #0b0e14;
  --surface:     #111520;
  --surface2:    #161b27;
  --border:      #1e2535;
  --accent:      #00d4aa;
  --warn:        #f7c948;
  --danger:      #ff5f57;
  --bull:        #f5f07a;
  --bear:        #111520;
  --bear-border: #cccccc;
  --bull-border: #999988;
  --text:        #c9d1e0;
  --muted:       #4a5568;
  --hline-hi:    #4fa3ff;
  --hline-lo:    #ff8c42;
  --chart-grid:  #1a1f2e;
  --chart-tick:  #4a5568;
  --tooltip-bg:  #1a2035;
  --skeleton-a:  #1e2535;
  --skeleton-b:  #1e2a3a;
  --font-mono:   'Share Tech Mono', monospace;
  --font-ui:     'Rajdhani', sans-serif;
  --radius:      6px;
  --shadow:      0 2px 12px rgba(0,0,0,0.4);
}

[data-theme="light"] {
  --bg:          #f0f2f5;
  --surface:     #ffffff;
  --surface2:    #f8f9fb;
  --border:      #dde1ea;
  --accent:      #0a7c5c;
  --warn:        #c98800;
  --danger:      #d93025;
  --bull:        #2c7a2c;
  --bear:        #ffffff;
  --bear-border: #cc3333;
  --bull-border: #2c7a2c;
  --text:        #1a2035;
  --muted:       #7a8499;
  --hline-hi:    #1565c0;
  --hline-lo:    #c65000;
  --chart-grid:  #e8ebf0;
  --chart-tick:  #8a94a6;
  --tooltip-bg:  #1a2035;
  --skeleton-a:  #e0e4ec;
  --skeleton-b:  #ced4df;
  --shadow:      0 2px 12px rgba(0,0,0,0.08);
}

/* ══════════════════════════════════════════
   RESET + BASE
══════════════════════════════════════════ */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: var(--font-ui);
  min-height: 100vh;
  transition: background 0.25s, color 0.25s;
}

/* ══════════════════════════════════════════
   HEADER
══════════════════════════════════════════ */
header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 12px 22px;
  border-bottom: 1px solid var(--border);
  background: var(--surface);
  position: sticky; top: 0; z-index: 100;
  box-shadow: var(--shadow);
  gap: 12px;
  flex-wrap: wrap;
  transition: background 0.25s, border-color 0.25s;
}
header h1 {
  font-family: var(--font-mono);
  font-size: 1.05rem;
  color: var(--accent);
  letter-spacing: 0.12em;
  text-transform: uppercase;
  white-space: nowrap;
}
header h1 span { color: var(--warn); }

#clock {
  font-family: var(--font-mono);
  font-size: 0.8rem;
  color: var(--muted);
  white-space: nowrap;
}
.header-controls { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }

/* ── BUTTONS ── */
button {
  font-family: var(--font-ui);
  font-weight: 600;
  font-size: 0.82rem;
  letter-spacing: 0.05em;
  padding: 6px 14px;
  border-radius: var(--radius);
  border: 1px solid var(--accent);
  background: transparent;
  color: var(--accent);
  cursor: pointer;
  transition: background 0.18s, color 0.18s, border-color 0.18s;
  white-space: nowrap;
}
button:hover { background: var(--accent); color: var(--bg); }
button:disabled { opacity: 0.35; cursor: not-allowed; }

#btn-theme {
  border-color: var(--muted);
  color: var(--muted);
  padding: 5px 10px;
  font-size: 1rem;
  line-height: 1;
}
#btn-theme:hover { border-color: var(--warn); background: transparent; color: var(--warn); }

#refresh-badge {
  font-family: var(--font-mono);
  font-size: 0.68rem;
  color: var(--muted);
  white-space: nowrap;
}
#refresh-badge.live { color: var(--accent); }

/* ══════════════════════════════════════════
   SYMBOL PANEL
══════════════════════════════════════════ */
#symbol-panel {
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  padding: 12px 22px;
  display: flex;
  flex-wrap: wrap;
  gap: 10px;
  align-items: center;
  transition: background 0.25s;
}
#symbol-panel > label {
  font-family: var(--font-mono);
  font-size: 0.72rem;
  color: var(--muted);
  text-transform: uppercase;
  letter-spacing: 0.1em;
  white-space: nowrap;
}
#symbol-input {
  flex: 1;
  min-width: 230px;
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  color: var(--text);
  font-family: var(--font-mono);
  font-size: 0.82rem;
  padding: 6px 12px;
  outline: none;
  transition: border-color 0.2s, background 0.25s, color 0.25s;
}
#symbol-input:focus { border-color: var(--accent); }
.hint { font-size: 0.68rem; color: var(--muted); font-family: var(--font-mono); }

/* ── FILE UPLOAD ── */
#file-input { display: none; }
.upload-label {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  font-family: var(--font-ui);
  font-weight: 600;
  font-size: 0.82rem;
  letter-spacing: 0.05em;
  padding: 6px 14px;
  border-radius: var(--radius);
  border: 1px dashed var(--accent);
  background: transparent;
  color: var(--accent);
  cursor: pointer;
  transition: background 0.18s, color 0.18s;
  white-space: nowrap;
}
.upload-label:hover { background: var(--accent); color: var(--bg); }

#file-badge {
  font-family: var(--font-mono);
  font-size: 0.68rem;
  color: var(--accent);
  background: rgba(0,212,170,0.1);
  border: 1px solid rgba(0,212,170,0.3);
  border-radius: 4px;
  padding: 3px 9px;
  display: none;
  white-space: nowrap;
}
[data-theme="light"] #file-badge {
  background: rgba(10,124,92,0.08);
  border-color: rgba(10,124,92,0.25);
}

/* ══════════════════════════════════════════
   STATUS BAR
══════════════════════════════════════════ */
#status-bar {
  padding: 5px 22px;
  font-family: var(--font-mono);
  font-size: 0.7rem;
  color: var(--muted);
  border-bottom: 1px solid var(--border);
  min-height: 26px;
  background: var(--surface2);
  transition: background 0.25s;
}
#status-bar .ok   { color: var(--accent); }
#status-bar .err  { color: var(--danger); }
#status-bar .warn { color: var(--warn); }

/* ══════════════════════════════════════════
   GRID
══════════════════════════════════════════ */
#grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(500px, 1fr));
  gap: 16px;
  padding: 18px 22px;
}

/* ══════════════════════════════════════════
   CARD
══════════════════════════════════════════ */
.card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  overflow: hidden;
  transition: border-color 0.2s, box-shadow 0.2s, background 0.25s;
}
.card:hover {
  border-color: var(--accent);
  box-shadow: 0 0 0 1px rgba(0,212,170,0.18);
}
[data-theme="light"] .card:hover {
  box-shadow: 0 0 0 1px rgba(10,124,92,0.18);
}

.card-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 9px 14px 7px;
  border-bottom: 1px solid var(--border);
}
.card-symbol {
  font-family: var(--font-mono);
  font-size: 0.88rem;
  color: var(--accent);
  letter-spacing: 0.08em;
  font-weight: bold;
}
.card-meta {
  font-size: 0.7rem;
  color: var(--muted);
  display: flex;
  gap: 10px;
  flex-wrap: wrap;
  justify-content: flex-end;
}
.card-meta span { white-space: nowrap; }
.tag-hi { color: var(--hline-hi) !important; }
.tag-lo { color: var(--hline-lo) !important; }

.card-body {
  padding: 8px 14px 10px;
  height: 215px;
}
.card-body canvas { width: 100% !important; height: 100% !important; }

.skeleton {
  height: 215px;
  background: linear-gradient(90deg, var(--skeleton-a) 25%, var(--skeleton-b) 50%, var(--skeleton-a) 75%);
  background-size: 200% 100%;
  animation: shimmer 1.4s infinite;
}
@keyframes shimmer { 0%{background-position:200% 0} 100%{background-position:-200% 0} }

.error-card {
  display: flex; align-items: center; justify-content: center;
  height: 215px; color: var(--danger);
  font-family: var(--font-mono); font-size: 0.76rem;
  padding: 0 20px; text-align: center;
}

.legend-strip {
  padding: 4px 14px 8px;
  display: flex; gap: 14px; flex-wrap: wrap;
  font-size: 0.67rem; font-family: var(--font-mono); color: var(--muted);
}
.legend-strip .dot {
  display: inline-block; width: 10px; height: 3px;
  border-radius: 2px; margin-right: 4px; vertical-align: middle;
}

/* ══════════════════════════════════════════
   RESPONSIVE
══════════════════════════════════════════ */
@media (max-width: 600px) {
  #grid { grid-template-columns: 1fr; padding: 10px; gap: 12px; }
  header, #symbol-panel { padding: 10px 14px; }
  .card-meta { gap: 6px; }
}
</style>
</head>
<body>

<!-- ============================================================
  ★  DEFAULT SYMBOL LIST — editable live in browser OR upload .txt
     NSE symbols end in .NS    BSE symbols end in .BO
============================================================ -->
<script>
const SYMBOLS = [
  "SRF.NS",
  "LUPIN.NS",
  // add more here:
  // "RELIANCE.NS",
  // "HDFCBANK.NS",
];

// ── CONFIG ─────────────────────────────────────
const INTERVAL       = "15m";  // 1m 2m 5m 15m 30m 60m
const PERIOD         = "1d";   // 1d 5d
const AUTO_REFRESH_S = 300;    // auto-refresh every N seconds (0 = off)
// ───────────────────────────────────────────────
</script>

<!-- HEADER -->
<header>
  <h1>▣ Intraday <span>Dashboard</span></h1>
  <div class="header-controls">
    <span id="refresh-badge">—</span>
    <button id="btn-refresh" onclick="loadAll()">↻ Refresh</button>
    <button id="btn-theme" onclick="toggleTheme()" title="Toggle Day / Night">🌙</button>
  </div>
  <span id="clock"></span>
</header>

<!-- SYMBOL PANEL -->
<div id="symbol-panel">
  <label>Symbols ›</label>
  <input id="symbol-input" type="text" placeholder="RELIANCE.NS, HDFCBANK.NS, INFY.NS …"/>
  <button onclick="applySymbolInput()">Apply</button>

  <!-- .TXT UPLOAD -->
  <input type="file" id="file-input" accept=".txt,.csv"/>
  <label for="file-input" class="upload-label">
    <svg width="13" height="13" viewBox="0 0 16 16" fill="currentColor" aria-hidden="true">
      <path d="M8 1a.5.5 0 0 1 .5.5v7.793l2.146-2.147a.5.5 0 0 1 .708.708l-3 3a.5.5 0 0 1-.708 0l-3-3a.5.5 0 1 1 .708-.708L7.5 9.293V1.5A.5.5 0 0 1 8 1z"/>
      <path d="M2 12a.5.5 0 0 1 .5-.5h11a.5.5 0 0 1 0 1h-11A.5.5 0 0 1 2 12z"/>
    </svg>
    Upload .txt
  </label>
  <span id="file-badge"></span>

  <span class="hint">.txt = one symbol per line &nbsp;·&nbsp; .NS = NSE &nbsp;·&nbsp; .BO = BSE</span>
</div>

<!-- STATUS -->
<div id="status-bar">Ready.</div>

<!-- GRID -->
<div id="grid"></div>


<script>
// ══════════════════════════════════════════════
//  STATE
// ══════════════════════════════════════════════
let activeSymbols  = [...SYMBOLS];
let countdownVal   = AUTO_REFRESH_S;
let countdownTimer = null;
let isDark         = true;

// ══════════════════════════════════════════════
//  CLOCK
// ══════════════════════════════════════════════
function updateClock() {
  document.getElementById('clock').textContent =
    new Date().toLocaleTimeString('en-IN', { hour12: false, timeZone: 'Asia/Kolkata' }) + ' IST';
}
setInterval(updateClock, 1000);
updateClock();

// ══════════════════════════════════════════════
//  DAY / NIGHT TOGGLE
// ══════════════════════════════════════════════
function toggleTheme() {
  isDark = !isDark;
  document.documentElement.setAttribute('data-theme', isDark ? 'dark' : 'light');
  document.getElementById('btn-theme').textContent = isDark ? '🌙' : '☀️';
  loadAll(); // redraw charts with new colours
}

// ══════════════════════════════════════════════
//  SYMBOL TEXT INPUT
// ══════════════════════════════════════════════
document.getElementById('symbol-input').value = activeSymbols.join(', ');

function applySymbolInput() {
  const raw = document.getElementById('symbol-input').value.trim();
  if (!raw) return;
  activeSymbols = raw.split(',').map(s => s.trim().toUpperCase()).filter(Boolean);
  hideBadge();
  loadAll();
}
document.getElementById('symbol-input').addEventListener('keydown', e => {
  if (e.key === 'Enter') applySymbolInput();
});

// ══════════════════════════════════════════════
//  FILE UPLOAD — parse .txt / .csv
//  Supports: one symbol per line, or comma-separated, or mix
// ══════════════════════════════════════════════
document.getElementById('file-input').addEventListener('change', function () {
  const file = this.files[0];
  if (!file) return;

  const reader = new FileReader();
  reader.onload = e => {
    const text = e.target.result;
    const symbols = text
      .split(/[\n,\r]+/)
      .map(s => s.trim().toUpperCase())
      .filter(s => s.length > 0 && !s.startsWith('#'));

    if (!symbols.length) {
      setStatus('⚠ No valid symbols found in the file.', 'err');
      return;
    }

    activeSymbols = symbols;
    document.getElementById('symbol-input').value = symbols.join(', ');

    const badge = document.getElementById('file-badge');
    badge.textContent = `📄 ${file.name}  (${symbols.length} symbols)`;
    badge.style.display = 'inline';

    setStatus(`Loaded ${symbols.length} symbols from "${file.name}"`, 'ok');
    loadAll();
  };
  reader.readAsText(file);
  this.value = ''; // allow re-upload of same file
});

function hideBadge() {
  document.getElementById('file-badge').style.display = 'none';
}

// ══════════════════════════════════════════════
//  YAHOO FINANCE via CORS proxy
// ══════════════════════════════════════════════
function yahooUrl(symbol) {
  const base = `https://query1.finance.yahoo.com/v8/finance/chart/${encodeURIComponent(symbol)}`;
  const qs   = `?interval=${INTERVAL}&range=${PERIOD}&includePrePost=false`;
  return `https://api.allorigins.win/get?url=${encodeURIComponent(base + qs)}`;
}

async function fetchSymbol(symbol) {
  const res  = await fetch(yahooUrl(symbol));
  if (!res.ok) throw new Error(`HTTP ${res.status}`);
  const wrap = await res.json();
  const data = JSON.parse(wrap.contents);
  const result = data?.chart?.result?.[0];
  if (!result) throw new Error('No data returned');

  const timestamps = result.timestamp;
  const q = result.indicators.quote[0];
  const candles = timestamps
    .map((ts, i) => ({ x: ts * 1000, o: q.open[i], h: q.high[i], l: q.low[i], c: q.close[i] }))
    .filter(c => c.o != null && c.h != null && c.l != null && c.c != null);

  if (!candles.length) throw new Error('Empty candle data');
  return candles;
}

// ══════════════════════════════════════════════
//  THEME-AWARE COLOUR HELPER
// ══════════════════════════════════════════════
function tc() {
  const s = getComputedStyle(document.documentElement);
  const g = v => s.getPropertyValue(v).trim();
  return {
    bull: g('--bull'), bear: g('--bear'),
    bullBorder: g('--bull-border'), bearBorder: g('--bear-border'),
    hlineHi: g('--hline-hi'), hlineLo: g('--hline-lo'),
    chartGrid: g('--chart-grid'), chartTick: g('--chart-tick'),
  };
}

// ══════════════════════════════════════════════
//  BUILD SKELETON CARD
// ══════════════════════════════════════════════
function buildCard(symbol) {
  const id   = 'c_' + symbol.replace(/[^a-zA-Z0-9]/g, '_');
  const card = document.createElement('div');
  card.className = 'card';
  card.id = 'card_' + id;
  card.innerHTML = `
    <div class="card-header">
      <span class="card-symbol">${symbol}</span>
      <div class="card-meta" id="meta_${id}">
        <span class="tag-hi">H1: —</span>
        <span class="tag-lo">L1: —</span>
        <span>loading…</span>
      </div>
    </div>
    <div class="skeleton" id="skel_${id}"></div>`;
  return { card, id };
}

// ══════════════════════════════════════════════
//  RENDER CHART INTO CARD
// ══════════════════════════════════════════════
function renderChart(card, id, symbol, candles) {
  document.getElementById('skel_' + id)?.remove();
  card.querySelector('.card-body')?.remove();
  card.querySelector('.legend-strip')?.remove();

  const fH  = candles[0].h;
  const fL  = candles[0].l;
  const lC  = candles[candles.length - 1].c;
  const chg = ((lC - candles[0].o) / candles[0].o * 100).toFixed(2);
  const chgColour = +chg >= 0 ? 'var(--accent)' : 'var(--danger)';

  // meta bar
  const meta = document.getElementById('meta_' + id);
  if (meta) meta.innerHTML = `
    <span class="tag-hi">H1: ${fH.toFixed(2)}</span>
    <span class="tag-lo">L1: ${fL.toFixed(2)}</span>
    <span>${candles.length} cdl</span>
    <span>LTP <b>${lC.toFixed(2)}</b></span>
    <span style="color:${chgColour}">${+chg >= 0 ? '+' : ''}${chg}%</span>`;

  // canvas
  const body   = document.createElement('div');
  body.className = 'card-body';
  const canvas = document.createElement('canvas');
  body.appendChild(canvas);
  card.appendChild(body);

  // legend
  const leg = document.createElement('div');
  leg.className = 'legend-strip';
  leg.innerHTML = `
    <span><span class="dot" style="background:var(--hline-hi)"></span><span class="tag-hi">1st High</span></span>
    <span><span class="dot" style="background:var(--hline-lo)"></span><span class="tag-lo">1st Low</span></span>
    <span><span class="dot" style="background:var(--bull);border:1px solid var(--bull-border)"></span>Bullish</span>
    <span><span class="dot" style="background:var(--bear);border:1px solid var(--bear-border)"></span>Bearish</span>`;
  card.appendChild(leg);

  // custom h-line plugin
  const hlinePlugin = {
    id: 'hl_' + id,
    afterDraw(chart) {
      const { ctx, chartArea: { left, right }, scales: { y } } = chart;
      const t = tc();
      [[fH, t.hlineHi], [fL, t.hlineLo]].forEach(([val, color]) => {
        const yp = y.getPixelForValue(val);
        ctx.save();
        ctx.strokeStyle = color;
        ctx.lineWidth   = 1.2;
        ctx.setLineDash([5, 4]);
        ctx.beginPath(); ctx.moveTo(left, yp); ctx.lineTo(right, yp); ctx.stroke();
        ctx.restore();
      });
    }
  };

  const t = tc();
  new Chart(canvas, {
    type: 'candlestick',
    data: {
      datasets: [{
        label: symbol,
        data: candles,
        color:       { up: t.bull,       down: t.bear,       unchanged: '#888' },
        borderColor: { up: t.bullBorder, down: t.bearBorder, unchanged: '#888' },
      }]
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      animation: false,
      plugins: {
        legend: { display: false },
        tooltip: {
          callbacks: {
            label: ctx => {
              const d = ctx.raw;
              return [`O: ${d.o?.toFixed(2)}  H: ${d.h?.toFixed(2)}  L: ${d.l?.toFixed(2)}  C: ${d.c?.toFixed(2)}`];
            }
          },
          backgroundColor: '#1a2035',
          titleColor: '#c9d1e0',
          bodyColor:  '#c9d1e0',
          borderColor:'#2a3550',
          borderWidth: 1,
          titleFont: { family: "'Share Tech Mono'" },
          bodyFont:  { family: "'Share Tech Mono'", size: 11 },
        }
      },
      scales: {
        x: {
          type: 'time',
          time: { unit: 'hour', displayFormats: { hour: 'HH:mm' } },
          ticks: { color: t.chartTick, font: { family: "'Share Tech Mono'", size: 10 }, maxRotation: 0, autoSkip: true, maxTicksLimit: 6 },
          grid:  { color: t.chartGrid },
        },
        y: {
          position: 'right',
          ticks: { color: t.chartTick, font: { family: "'Share Tech Mono'", size: 10 }, maxTicksLimit: 5 },
          grid:  { color: t.chartGrid },
        }
      }
    },
    plugins: [hlinePlugin]
  });
}

// ══════════════════════════════════════════════
//  RENDER ERROR
// ══════════════════════════════════════════════
function renderError(card, id, msg) {
  document.getElementById('skel_' + id)?.remove();
  const div = document.createElement('div');
  div.className = 'error-card';
  div.textContent = `⚠ ${msg}`;
  card.appendChild(div);
}

// ══════════════════════════════════════════════
//  LOAD ALL
// ══════════════════════════════════════════════
async function loadAll() {
  document.getElementById('btn-refresh').disabled = true;
  setStatus('Fetching data…', 'warn');

  document.getElementById('grid').innerHTML = '';
  Object.values(Chart.instances || {}).forEach(c => { try { c.destroy(); } catch(_){} });

  const results = await Promise.all(
    activeSymbols.map(async symbol => {
      const { card, id } = buildCard(symbol);
      document.getElementById('grid').appendChild(card);
      try {
        const candles = await fetchSymbol(symbol);
        renderChart(card, id, symbol, candles);
        return { symbol, ok: true };
      } catch(e) {
        renderError(card, id, e.message || 'Failed');
        return { symbol, ok: false };
      }
    })
  );

  const ok  = results.filter(r => r.ok).length;
  const bad = results.filter(r => !r.ok).map(r => r.symbol);
  const errStr = bad.length ? `  ·  ⚠ Failed: ${bad.join(', ')}` : '';
  const time   = new Date().toLocaleTimeString('en-IN', { timeZone: 'Asia/Kolkata' });
  setStatus(`✓ Loaded ${ok}/${activeSymbols.length} symbols${errStr}  ·  ${time} IST`,
            ok === activeSymbols.length ? 'ok' : 'warn');

  document.getElementById('btn-refresh').disabled = false;
  resetCountdown();
}

// ══════════════════════════════════════════════
//  STATUS
// ══════════════════════════════════════════════
function setStatus(msg, cls = '') {
  document.getElementById('status-bar').innerHTML = `<span class="${cls}">${msg}</span>`;
}

// ══════════════════════════════════════════════
//  AUTO-REFRESH COUNTDOWN
// ══════════════════════════════════════════════
function resetCountdown() {
  clearInterval(countdownTimer);
  const badge = document.getElementById('refresh-badge');
  if (AUTO_REFRESH_S <= 0) { badge.textContent = 'manual'; badge.className = ''; return; }
  countdownVal  = AUTO_REFRESH_S;
  badge.className = 'live';
  countdownTimer = setInterval(() => {
    countdownVal--;
    badge.textContent = `↻ ${countdownVal}s`;
    if (countdownVal <= 0) { clearInterval(countdownTimer); loadAll(); }
  }, 1000);
}

// ══════════════════════════════════════════════
//  INIT
// ══════════════════════════════════════════════
loadAll();
</script>
